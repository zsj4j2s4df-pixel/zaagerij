name: Deploy waterslag naar GitHub Pages

# Wanneer draait dit? Bij een wijziging in de waterslag-app op onze branch
# of op main, en je kunt hem ook met de hand starten (workflow_dispatch).
on:
  push:
    branches: ["claude/water-slag-meetapp-jxaood", "main"]
    paths:
      - "waterslag/**"
      - ".github/workflows/deploy-waterslag.yml"
  workflow_dispatch:

# Rechten die de workflow nodig heeft om naar Pages te publiceren.
permissions:
  contents: read
  pages: write
  id-token: write

# Niet twee keer tegelijk publiceren.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # 1) De app bouwen tot statische bestanden.
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4
      - name: Node installeren
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Pakketten installeren
        working-directory: waterslag
        run: npm ci
      - name: App bouwen
        working-directory: waterslag
        run: npm run build
      - name: GitHub Pages voorbereiden (indien nog niet aan)
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Gebouwde app klaarzetten
        uses: actions/upload-pages-artifact@v3
        with:
          path: waterslag/dist

  # 2) De gebouwde app publiceren op GitHub Pages.
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publiceren op GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
